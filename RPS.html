      computerMoveName = 'Scissor';
    }

// 1 === 1

      userMove === 2 && computerMove === 3 ||
      userMove === 3 && computerMove === 1
    ){
      console.log(`You picked Rock, ComputerPicked ${computerMoveName}. Computer wins`
      )

      console.log(`You picked Rock, computer picked ${computerMoveName}. User wins`)
