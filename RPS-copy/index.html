<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="Style/index.css">
</head>
<body>
  <h3>Rock paper Scissors</h3>
  <div>
  <button class = "rps-button" onclick="playGame(0); ">
    <img class ="rps-images" src="images/rock.png" alt="">
  </button>
  <button class = "rps-button"
  onclick ="playGame(1);">
   <img class ="rps-images" src="images/paper.png" alt="">
  </button>
  <button class = "rps-button"
  onclick ="playGame(2);">
     <img class ="rps-images" src="images/scissors.png" alt="">
  </button>
  <p id = "js-result"></p>
  <p id = "js-score"></p>
  </div>
  <br>
  <div>
  <button onclick="resetScore();">Reset score</button>
  <button id = "auto-play-button"
  onclick = "autoPlay();">Auto Play</button>
  </div>
  <script src="Scripts/index.js"></script>
</body>
</html>
